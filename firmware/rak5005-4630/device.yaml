# RAK WisBlock 5005 + 4630 + 4631 GPS — Meshtastic device configuration
# Apply with: meshtastic --configure firmware/rak5005-4630/device.yaml
#
# NOTE: This device has the RAK 4631 GPS module. GPS is enabled.
# Channel: default public LongFast (PSK AQ==). TAK payloads are
# encrypted at the app layer by the ATAK plugin (AES-256-GCM).
#
# IMPORTANT: After applying, set full position precision on channel 0:
#   meshtastic --ch-set module_settings.position_precision 32 --ch-index 0
# Without this, Meshtastic truncates coords to ~5km blocks (privacy feature).

config:
  lora:
    modem_preset: LONG_FAST        # 915MHz US; switch to SHORT_TURBO for file transfer
    region: US
    tx_power: 30
    hop_limit: 3
    channel_num: 0

  device:
    role: CLIENT                   # TODO: ROUTER for fixed relay nodes
    serial_enabled: false

  position:
    position_broadcast_smart_enabled: true
    gps_enabled: true              # RAK 4631 GPS module present
    gps_update_interval: 30        # seconds
    position_broadcast_secs: 300   # broadcast position every 5 min

  power:
    is_power_saving: false         # TODO: set true for battery-only field deployment

  display:
    auto_screen_carousel_secs: 0
