# RAK19007 WisBlock Base Board 2nd Gen + RAK4631 — Base Station
# Apply with: meshtastic --configure firmware/rak19007-base/device.yaml
#
# Role: Fixed base station (solar + 5dB antenna, roof-mounted)
# No GPS module — uses fixed position.
# Fixed position set to house coordinates.
#
# Channel: default public LongFast (PSK AQ==). TAK payloads are
# encrypted at the app layer by the ATAK plugin (AES-256-GCM).
#
# NOTE: gps_mode must be NOT_PRESENT for fixed-position devices
# without a GPS module. ENABLED (default) gates position broadcasts
# on GPS readiness, which never arrives → node goes radio-silent.
#
# IMPORTANT: After applying, set full position precision on channel 0:
#   meshtastic --ch-set module_settings.position_precision 32 --ch-index 0
# Without this, Meshtastic truncates coords to ~5km blocks (privacy feature).

config:
  lora:
    modem_preset: LONG_FAST
    region: US
    tx_power: 30
    hop_limit: 3
    channel_num: 0

  device:
    role: ROUTER                   # Fixed relay — rebroadcasts but no user interaction
    serial_enabled: false

  position:
    position_broadcast_smart_enabled: false
    gps_enabled: false
    gps_mode: NOT_PRESENT            # CRITICAL: without this, broadcast timer never fires
    fixed_position: true
    fixed_latitude: 38.84191827120099
    fixed_longitude: -77.29344941776387
    position_broadcast_secs: 120

  power:
    is_power_saving: false         # Solar-powered — no need to conserve

  display:
    auto_screen_carousel_secs: 0
