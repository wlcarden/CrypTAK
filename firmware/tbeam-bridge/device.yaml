# LilyGo T-Beam — TAK Server Bridge Node
# Apply with: meshtastic --host 192.168.50.198 --configure firmware/tbeam-bridge/device.yaml
#
# Role: Bridge between mesh network and TAK server.
# Connected to TAK server via USB serial or WiFi TCP.
# Receives all mesh traffic and forwards to the relay service.
# Has built-in GPS.
#
# Channel: default public LongFast (PSK AQ==). TAK payloads are
# encrypted at the app layer by the ATAK plugin (AES-256-GCM).
#
# IMPORTANT: After applying, set full position precision on channel 0:
#   meshtastic --host 192.168.50.198 --ch-set module_settings.position_precision 32 --ch-index 0
# Without this, Meshtastic truncates coords to ~5km blocks (privacy feature).

config:
  lora:
    modem_preset: LONG_FAST
    region: US
    tx_power: 30
    hop_limit: 3
    channel_num: 0

  device:
    role: CLIENT                   # Receives mesh traffic, can send CoT back to mesh
    serial_enabled: true           # Required for USB bridge to relay service

  position:
    position_broadcast_smart_enabled: true
    gps_enabled: true
    gps_update_interval: 30
    position_broadcast_secs: 900   # Fixed indoor node — infrequent broadcasts

  power:
    is_power_saving: false         # USB-powered from server

  display:
    auto_screen_carousel_secs: 0
