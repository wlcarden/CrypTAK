# Prototype Solar Node — ROUTER profile (enhanced telemetry)
# Hanging solar relay prototype. Maximum diagnostic telemetry for testing.
# No GPS. All sensor types enabled to probe available hardware.
# NOTE: Not for production — use relay.yaml for deployed nodes.
#
# Apply via: ./firmware/provision.sh "Node Name"

config:
  lora:
    modem_preset: LONG_FAST
    region: US
    tx_power: 30
    hop_limit: 3
    channel_num: 0

  device:
    role: ROUTER
    serial_enabled: false
    rebroadcast_mode: ALL
    node_info_broadcast_secs: 1800      # 30 min — more visible during testing

  position:
    position_broadcast_smart_enabled: false
    gps_enabled: false
    position_broadcast_secs: 3600

  telemetry:
    device_update_interval: 120         # 2 min — catch fast changes during test
    device_telemetry_enabled: true
    environment_update_interval: 120    # Probe env sensors (BME280 etc.) if present
    environment_measurement_enabled: true
    power_update_interval: 120          # Probe INA power monitor if present
    power_measurement_enabled: true

  power:
    is_power_saving: false

  display:
    auto_screen_carousel_secs: 0
