# Mobile Tracker — TRACKER profile
# GPS-enabled battery node for vehicle/person tracking.
# Broadcasts position frequently with smart positioning.
# Requires hardware with GPS module (RAK5005+4630, T-Beam).
#
# Apply via: ./firmware/provision.sh "Node Name"

config:
  lora:
    modem_preset: LONG_FAST
    region: US
    tx_power: 30
    hop_limit: 3
    channel_num: 0

  device:
    role: TRACKER
    serial_enabled: false
    rebroadcast_mode: ALL
    node_info_broadcast_secs: 900            # 15 min — frequent enough for diagnostics

  position:
    position_broadcast_smart_enabled: true
    broadcast_smart_minimum_interval_secs: 30  # Floor at 30s when moving during testing
    gps_enabled: true
    gps_update_interval: 15
    position_broadcast_secs: 60             # 1 min timer — high frequency during testing

  telemetry:
    device_update_interval: 60              # 1 min — max diagnostics during testing
    device_telemetry_enabled: true

  power:
    is_power_saving: false                  # Off during testing; re-evaluate for field deployment

  display:
    auto_screen_carousel_secs: 0
