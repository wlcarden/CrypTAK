# Vehicle Node — ROUTER_CLIENT profile
# Mobile repeater mounted in a vehicle. Rebroadcasts all mesh traffic
# while actively reporting GPS position. Charges via USB when car is on,
# runs on battery when parked.
#
# Apply via: ./firmware/provision.sh "Node Name"

config:
  lora:
    modem_preset: LONG_FAST
    region: US
    tx_power: 30
    hop_limit: 3
    channel_num: 0

  device:
    role: ROUTER_CLIENT
    serial_enabled: false
    node_info_broadcast_secs: 3600

  position:
    position_broadcast_smart_enabled: true
    broadcast_smart_minimum_interval_secs: 120
    gps_enabled: true
    gps_update_interval: 15
    position_broadcast_secs: 120

  telemetry:
    device_update_interval: 300
    device_telemetry_enabled: true

  power:
    is_power_saving: false

  display:
    auto_screen_carousel_secs: 0
