# Field Node — CLIENT profile
# GPS-enabled mobile node for general field use.
# Less aggressive than TRACKER — longer broadcast intervals, no power saving.
# Requires hardware with GPS module (RAK5005+4630, T-Beam).
#
# Apply via: ./firmware/provision.sh "Node Name"

config:
  lora:
    modem_preset: LONG_FAST
    region: US
    tx_power: 30
    hop_limit: 3
    channel_num: 0

  device:
    role: CLIENT
    serial_enabled: false
    rebroadcast_mode: ALL
    node_info_broadcast_secs: 3600

  position:
    position_broadcast_smart_enabled: true
    broadcast_smart_minimum_interval_secs: 300  # 5 min floor when stationary
    gps_enabled: true
    gps_update_interval: 30
    position_broadcast_secs: 300

  telemetry:
    device_update_interval: 300
    device_telemetry_enabled: true

  power:
    is_power_saving: false

  display:
    auto_screen_carousel_secs: 0
