# Mesh Relay — ROUTER profile
# Solar relay node. Rebroadcasts all mesh traffic.
# Uses GPS if available. For boards without GPS (e.g. RAK19007),
# set gps: false in nodes.yaml — provision.sh will override to fixed position.
#
# Apply via: ./firmware/provision.sh "Node Name"

config:
  lora:
    modem_preset: LONG_FAST
    region: US
    tx_power: 30
    hop_limit: 3
    channel_num: 0

  device:
    role: ROUTER
    serial_enabled: false
    node_info_broadcast_secs: 3600

  position:
    position_broadcast_smart_enabled: false   # Fixed nodes never move; smart = never broadcasts
    gps_enabled: true
    gps_update_interval: 60
    position_broadcast_secs: 600             # 10 min timer, reduces relay channel load

  telemetry:
    device_update_interval: 300              # 5 min — solar battery % is critical to monitor
    device_telemetry_enabled: true

  power:
    is_power_saving: false

  display:
    auto_screen_carousel_secs: 0
