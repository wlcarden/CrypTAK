# Mesh Relay — ROUTER profile
# Deployable relay node. Assumed solar-powered for CrypTAK deployments.
# Rebroadcasts all mesh traffic. GPS position broadcast on a fixed timer
# (smart positioning disabled — relay positions are static in the field).
# For boards without GPS (e.g. RAK19007), set gps: false in nodes.yaml
# and provision.sh will apply a fixed coordinate instead.
#
# Apply via: ./firmware/provision.sh "Node Name"

config:
  lora:
    modem_preset: LONG_FAST
    region: US
    tx_power: 30
    hop_limit: 3
    channel_num: 0

  device:
    role: ROUTER
    serial_enabled: false
    rebroadcast_mode: ALL
    node_info_broadcast_secs: 900            # 15 min — frequent enough for diagnostics

  position:
    position_broadcast_smart_enabled: false  # Relays are fixed; smart = never broadcasts
    gps_enabled: true
    gps_update_interval: 60
    position_broadcast_secs: 300             # 5 min — high frequency during testing

  telemetry:
    device_update_interval: 60              # 1 min — solar health critical to monitor; max during testing
    device_telemetry_enabled: true

  power:
    is_power_saving: false

  display:
    auto_screen_carousel_secs: 0
