# Mosquitto MQTT broker configuration template
#
# Live config: /mnt/user/appdata/mosquitto/config/mosquitto.conf
# This file is a disaster-recovery reference — not auto-deployed.
#
# After copying to the live path, create the password file:
#   docker exec mosquitto mosquitto_passwd -c /mosquitto/config/passwd <username>

listener 1883 0.0.0.0
allow_anonymous false
password_file /mosquitto/config/passwd

persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_type all
