<html>
<head>
    <title>CrypTAK WebMap</title>
    <meta charset="UTF-8">
    <meta name="mobile-web-app-capable" content="yes"/>
    <meta name='viewport' content='width=device-width, initial-scale=1.0, user-scalable=no'/>
    <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
    <link rel="shortcut icon" type="image/ico" href="favicon.ico"/>

    <!-- Stock worldmap dependencies — do not reorder -->
    <link rel="stylesheet" type="text/css" href="leaflet/font-awesome/css/font-awesome.min.css"/>
    <link rel="stylesheet" type="text/css" href="leaflet/weather-icons-lite/css/weather-icons-lite.min.css"/>
    <link rel="stylesheet" type="text/css" href="leaflet/leaflet.css"/>
    <link rel="stylesheet" type="text/css" href="leaflet/leaflet-vector-markers.css">
    <link rel="stylesheet" type="text/css" href="leaflet/MarkerCluster.css">
    <link rel="stylesheet" type="text/css" href="leaflet/MarkerCluster.Default.css">
    <link rel="stylesheet" type="text/css" href="leaflet/leaflet-geoman.css">
    <link rel="stylesheet" type="text/css" href="leaflet/leaflet-ruler.css">
    <link rel="stylesheet" type="text/css" href="leaflet/easy-button.css">
    <link rel="stylesheet" type="text/css" href="leaflet/leaflet.fullscreen.css">
    <link rel="stylesheet" type="text/css" href="leaflet/Leaflet.Dialog.css">
    <link rel="stylesheet" type="text/css" href="leaflet/Control.MiniMap.min.css">
    <link rel="stylesheet" type="text/css" href="leaflet/leaflet-velocity.min.css">
    <link rel="stylesheet" type="text/css" href="leaflet/leaflet.mousecoordinate.css">
    <link rel="stylesheet" type="text/css" href="css/worldmap.css"/>

    <script src="leaflet/sockjs.min.js"></script>
    <script src="leaflet/leaflet.js"></script>
    <script src="leaflet/leaflet-vector-markers.min.js"></script>
    <script src="leaflet/leaflet.boatmarker.js"></script>
    <script src="leaflet/leaflet.markercluster.js"></script>
    <script src="leaflet/leaflet.markercluster.freezable.js"></script>
    <script src="leaflet/leaflet.active-layers.min.js"></script>
    <script src="leaflet/leaflet.select-layers.min.js"></script>
    <script src="leaflet/leaflet-geoman.min.js"></script>
    <script src="leaflet/leaflet-ruler.js"></script>
    <script src="leaflet/easy-button.js"></script>
    <script src="leaflet/Leaflet.fullscreen.min.js"></script>
    <script src="leaflet/Leaflet.Dialog.js"></script>
    <script src="leaflet/l.ellipse.min.js"></script>
    <script src="leaflet/milsymbol.js"></script>
    <script src="leaflet/nvg.js" async></script>
    <script src="leaflet/leaflet-heat.js"></script>
    <script src="leaflet/TileLayer.Grayscale.js"></script>
    <script src="leaflet/TileLayer.GrayscaleWMS.js"></script>
    <script src="leaflet/Control.MiniMap.min.js"></script>
    <script src="leaflet/L.Terminator.js"></script>
    <script src="leaflet/leaflet-velocity.min.js"></script>
    <script src="leaflet/leaflet.rotatedMarker.js"></script>
    <script src="leaflet/leaflet-side-by-side.js"></script>
    <script src="leaflet/OSMBuildings-Leaflet.js"></script>
    <script src="leaflet/leaflet-omnivore.min.js"></script>
    <script src="leaflet/togeojson.umd.js"></script>
    <script src="leaflet/leaflet-kmz.js"></script>
    <script src="leaflet/leaflet-rotate.js"></script>
    <script src="leaflet/leaflet.mousecoordinate.js"></script>
    <script src="leaflet/leaflet.latlng-graticule.js"></script>
    <script src="leaflet/VectorTileLayer.umd.min.js"></script>
    <script src="leaflet/esri-leaflet.js"></script>
    <script src="leaflet/protomaps-leaflet.min.js"></script>
    <script src="leaflet/pmtiles.js"></script>
    <script src="leaflet/Semicircle.js"></script>
    <script src="leaflet/Leaflet.LimitZoom.js"></script>
    <script src="leaflet/leaflet-arc.min.js"></script>
    <script src="leaflet/leaflet.antimeridian-src.js"></script>
    <script src="leaflet/L.TileLayer.PixelFilter.js"></script>
    <script src="leaflet/jszip.min.js"></script>
    <script src="images/emoji.js"></script>

    <style>
    /* ── Sidebar layout ─────────────────────────────────────── */
    #map {
      left: 0 !important;
      right: 320px !important;
      min-width: 0 !important;
      width: auto !important;
    }
    #sidebar {
      position: fixed;
      top: 40px;
      right: 0;
      width: 320px;
      bottom: 0;
      background: #1a1a1a;
      color: #ccc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      display: flex;
      flex-direction: column;
      z-index: 1000;
      border-left: 1px solid #333;
      overflow: hidden;
    }
    #sidebar.collapsed {
      width: 0;
      border-left: none;
    }
    #sidebar.collapsed ~ #map {
      right: 0 !important;
    }

    /* Toggle button */
    #sidebar-toggle {
      position: fixed;
      top: 48px;
      right: 324px;
      z-index: 1001;
      background: #1a1a1a;
      color: #888;
      border: 1px solid #333;
      border-right: none;
      border-radius: 4px 0 0 4px;
      padding: 6px 5px;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
    }
    #sidebar-toggle:hover { color: #fff; }
    #sidebar.collapsed ~ #sidebar-toggle {
      right: 0;
      border-right: 1px solid #333;
      border-radius: 4px;
    }

    /* Search */
    #sb-search-wrap {
      padding: 8px 10px;
      border-bottom: 1px solid #333;
      flex-shrink: 0;
    }
    #sb-search {
      width: 100%;
      box-sizing: border-box;
      background: #111;
      border: 1px solid #444;
      border-radius: 4px;
      color: #ddd;
      padding: 6px 8px;
      font-size: 13px;
      outline: none;
    }
    #sb-search:focus { border-color: #0066FF; }
    #sb-search::placeholder { color: #666; }

    /* Sort toolbar */
    #sb-toolbar {
      display: flex;
      align-items: center;
      padding: 5px 10px;
      border-bottom: 1px solid #333;
      gap: 4px;
      flex-shrink: 0;
    }
    .sb-sort-btn {
      background: #222;
      border: 1px solid #444;
      border-radius: 3px;
      color: #888;
      font-size: 11px;
      padding: 3px 8px;
      cursor: pointer;
      white-space: nowrap;
    }
    .sb-sort-btn:hover { color: #ccc; border-color: #666; }
    .sb-sort-btn.active { color: #fff; background: #0066FF; border-color: #0066FF; }
    #sb-toolbar-spacer { flex: 1; }
    #sb-trail-duration {
        background: #222; color: #aaa; border: 1px solid #444;
        border-radius: 3px; font-size: 11px; padding: 2px 4px;
        cursor: pointer;
    }
    #sb-trail-duration:hover { border-color: #666; color: #ccc; }

    /* Summary bar */
    #sb-summary {
      padding: 4px 10px;
      border-bottom: 1px solid #333;
      font-size: 11px;
      color: #888;
      flex-shrink: 0;
    }

    /* Scrollable marker list */
    #sb-list {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
    }
    #sb-list::-webkit-scrollbar { width: 6px; }
    #sb-list::-webkit-scrollbar-track { background: #111; }
    #sb-list::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

    /* Layer group */
    .sb-group { border-bottom: 1px solid #2a2a2a; }
    .sb-group-header {
      display: flex;
      align-items: center;
      padding: 7px 10px;
      background: #222;
      cursor: pointer;
      user-select: none;
      position: sticky;
      top: 0;
      z-index: 1;
    }
    .sb-group-header:hover { background: #2a2a2a; }
    .sb-group-caret {
      width: 16px;
      font-size: 10px;
      color: #666;
      flex-shrink: 0;
      transition: transform 0.15s;
    }
    .sb-group.collapsed .sb-group-caret { transform: rotate(-90deg); }
    .sb-group-label {
      flex: 1;
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #999;
    }
    .sb-group-count {
      background: #333;
      color: #aaa;
      font-size: 11px;
      padding: 1px 7px;
      border-radius: 8px;
      min-width: 18px;
      text-align: center;
    }
    .sb-group-items { }
    .sb-group.collapsed .sb-group-items { display: none; }

    /* Marker row */
    .sb-marker {
      display: flex;
      align-items: center;
      padding: 6px 10px 6px 26px;
      cursor: pointer;
      border-bottom: 1px solid #1f1f1f;
    }
    .sb-marker:hover { background: #252525; }
    .sb-marker-icon {
      width: 22px;
      text-align: center;
      flex-shrink: 0;
      margin-right: 8px;
      font-size: 15px;
    }
    .sb-marker-info {
      flex: 1;
      min-width: 0;
    }
    .sb-marker-name {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #ddd;
      font-size: 13px;
    }
    .sb-marker-meta {
      font-size: 11px;
      color: #666;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 1px;
    }
    .sb-marker-age {
      flex-shrink: 0;
      font-size: 11px;
      color: #666;
      margin-left: 8px;
      font-variant-numeric: tabular-nums;
    }

    /* Connected clients section */
    #sb-clients {
      border-bottom: 1px solid #333;
      flex-shrink: 0;
    }
    #sb-clients-header {
      display: flex;
      align-items: center;
      padding: 7px 10px;
      background: #222;
      cursor: pointer;
      user-select: none;
    }
    #sb-clients-header:hover { background: #2a2a2a; }
    .sb-client-count {
      background: #1a6b35;
      color: #7fff7f;
      font-size: 11px;
      padding: 1px 7px;
      border-radius: 8px;
      min-width: 18px;
      text-align: center;
      margin-left: auto;
    }
    .sb-client-count.zero { background: #333; color: #666; }
    #sb-clients-list { }
    #sb-clients.collapsed #sb-clients-list { display: none; }
    .sb-client-row {
      display: flex;
      align-items: center;
      padding: 5px 10px 5px 26px;
      border-bottom: 1px solid #1f1f1f;
      font-size: 12px;
    }
    .sb-client-row.has-loc { cursor: pointer; }
    .sb-client-row.has-loc:hover { background: #252525; }
    .sb-client-icon {
      width: 18px;
      text-align: center;
      flex-shrink: 0;
      margin-right: 8px;
      font-size: 12px;
    }
    .sb-client-online { color: #4CAF50; }
    .sb-client-name {
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #ccc;
    }
    .sb-client-loc-badge {
      font-size: 10px;
      color: #555;
      margin-left: 6px;
      flex-shrink: 0;
    }

    /* Signal quality dot on marker rows */
    .sb-signal {
      flex-shrink: 0;
      margin-left: 6px;
      font-size: 7px;
      line-height: 1;
    }
    .sb-signal[title] { cursor: help; }

    /* Mesh network health section */
    #sb-mesh {
      border-bottom: 1px solid #333;
      flex-shrink: 0;
    }
    #sb-mesh-header {
      display: flex;
      align-items: center;
      padding: 7px 10px;
      background: #222;
      cursor: pointer;
      user-select: none;
    }
    #sb-mesh-header:hover { background: #2a2a2a; }
    #sb-mesh.collapsed #sb-mesh-body { display: none; }
    #sb-mesh-body {
      padding: 6px 10px 8px 26px;
      font-size: 12px;
      color: #999;
    }
    .sb-mesh-stat {
      display: flex;
      justify-content: space-between;
      margin-bottom: 3px;
    }
    .sb-mesh-stat-val { color: #ccc; }
    .sb-mesh-bar-wrap {
      background: #111;
      border-radius: 2px;
      height: 6px;
      margin-top: 4px;
      overflow: hidden;
    }
    .sb-mesh-bar {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s;
    }

    /* Empty state */
    .sb-empty {
      padding: 40px 20px;
      text-align: center;
      color: #555;
      font-size: 13px;
    }

    /* Mesh network status panel */
    #sb-mesh-nodes, #sb-mesh-community-nodes {
      overflow-x: hidden;
    }
    .sb-mesh-node {
      display: flex;
      align-items: flex-start;
      padding: 5px 10px 5px 10px;
      border-bottom: 1px solid #1f1f1f;
    }
    .sb-mesh-node-dot {
      font-size: 10px;
      width: 16px;
      flex-shrink: 0;
      margin-right: 6px;
      padding-top: 2px;
      text-align: center;
    }
    .sb-mesh-node-info { flex: 1; min-width: 0; }
    .sb-mesh-node-name {
      font-size: 12px;
      color: #ccc;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .sb-mesh-node-name.owned { color: #aac0ee; }
    .sb-mesh-node-meta {
      font-size: 11px;
      color: #666;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 1px;
    }
    .sb-mesh-node-age {
      font-size: 11px;
      color: #555;
      flex-shrink: 0;
      margin-left: 6px;
      font-variant-numeric: tabular-nums;
      padding-top: 1px;
    }
    .mesh-st-online { color: #4CAF50; }
    .mesh-st-recent { color: #FFD600; }
    .mesh-st-stale  { color: #888; }
    .mesh-st-old    { color: #3a3a3a; }
    /* Battery color classes */
    .bat-usb  { color: #64B5F6; }
    .bat-ok   { color: #4CAF50; }
    .bat-low  { color: #FFD600; }
    .bat-crit { color: #FF5252; }
    /* Reboot flag */
    .mesh-reboot { color: #FF8C00; font-size: 10px; margin-left: 3px; }
    /* Mesh health summary bar */
    #sb-mesh-summary {
      padding: 4px 10px 4px 26px;
      font-size: 11px;
      border-bottom: 1px solid #1f1f1f;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .mesh-warn  { color: #FF8C00; }
    .mesh-alert { color: #FF5252; }
    #sb-mesh-community-toggle {
      padding: 5px 10px 5px 26px;
      font-size: 11px;
      color: #555;
      cursor: pointer;
      border-top: 1px solid #2a2a2a;
      border-bottom: 1px solid #1f1f1f;
      user-select: none;
    }
    #sb-mesh-community-toggle:hover { color: #999; }
    .mesh-bridge-badge { color: #7EB3FF; font-size: 10px; letter-spacing: 0.05em; font-weight: 600; }
    #sb-mesh-last-update {
      padding: 3px 10px 4px 26px;
      font-size: 10px;
      color: #3a3a3a;
      font-style: italic;
      border-top: 1px solid #1f1f1f;
    }

    /* Mobile: hide sidebar below 768px */
    @media (max-width: 768px) {
      #sidebar { display: none; }
      #sidebar-toggle { display: none; }
      #map { right: 0 !important; }
    }
    </style>
</head>

<body>
<div id="topbar">
    <a href="https://nodered.org" id="toplink"><img id="toplogo" src="images/node-red.png" style="max-width:60px; height:24px; margin-top:-3px" alt="NRed"/></a>
    <span class="topbar" id="topwords"> Node-RED - map all the things</span>
</div>
<div id="results">
    <span id="searchResult"></span>
    <span id="bars" onclick='toggleMenu()'><i class="fa fa-bars fa-2x fa-inverse"></i></span>
</div>
<div id="menu"></div>
<div id="map"></div>
<div id="footer"></div>

<!-- Sidebar -->
<button id="sidebar-toggle" title="Toggle sidebar"><i class="fa fa-chevron-right"></i></button>
<div id="sidebar">
    <div id="sb-search-wrap">
        <input type="text" id="sb-search" placeholder="Filter markers..."/>
    </div>
    <div id="sb-toolbar">
        <button class="sb-sort-btn active" data-sort="recent" title="Most recent first"><i class="fa fa-clock-o"></i> Recent</button>
        <button class="sb-sort-btn" data-sort="alpha" title="Alphabetical"><i class="fa fa-sort-alpha-asc"></i> A-Z</button>
        <span id="sb-toolbar-spacer"></span>
        <select id="sb-trail-duration" title="Tracker trail display window">
            <option value="0">No Trail</option>
            <option value="3600000" selected>1h Trail</option>
            <option value="21600000">6h Trail</option>
            <option value="43200000">12h Trail</option>
            <option value="86400000">24h Trail</option>
        </select>
        <button class="sb-sort-btn" data-sort="group" title="Group by layer" id="sb-group-toggle"><i class="fa fa-object-group"></i></button>
    </div>
    <div id="sb-mesh">
        <div id="sb-mesh-header">
            <span class="sb-group-caret"><i class="fa fa-caret-down"></i></span>
            <span class="sb-group-label">Mesh Network</span>
            <span class="sb-client-count zero" id="sb-mesh-count">0</span>
        </div>
        <div id="sb-mesh-body">
            <div id="sb-mesh-summary" style="display:none"></div>
            <div id="sb-mesh-nodes"></div>
            <div id="sb-mesh-community-toggle" style="display:none"></div>
            <div id="sb-mesh-community-nodes" style="display:none"></div>
            <div id="sb-mesh-last-update"></div>
        </div>
    </div>
    <div id="sb-clients">
        <div id="sb-clients-header">
            <span class="sb-group-caret"><i class="fa fa-caret-down"></i></span>
            <span class="sb-group-label">Connected</span>
            <span class="sb-client-count zero" id="sb-client-count">0</span>
        </div>
        <div id="sb-clients-list"></div>
    </div>
    <div id="sb-summary">Waiting for data...</div>
    <div id="sb-list">
        <div class="sb-empty">No markers</div>
    </div>
</div>

<!-- Stock worldmap.js — loads all map logic, creates global ws/markers/allData/map -->
<script src="worldmap.js"></script>

<!-- Sidebar controller — hooks into worldmap globals after they initialize -->
<script>
(function() {
    var sidebar = document.getElementById('sidebar');
    var sbList = document.getElementById('sb-list');
    var sbSummary = document.getElementById('sb-summary');
    var sbSearch = document.getElementById('sb-search');
    var sbToggle = document.getElementById('sidebar-toggle');
    var sbGroupToggle = document.getElementById('sb-group-toggle');
    var sbClientsSection = document.getElementById('sb-clients');
    var sbClientsList = document.getElementById('sb-clients-list');
    var sbClientCount = document.getElementById('sb-client-count');
    var sbMeshSection = document.getElementById('sb-mesh');
    var sbMeshBody = document.getElementById('sb-mesh-body');
    var sbMeshCount = document.getElementById('sb-mesh-count');
    var meshCollapsed = true;
    var filter = '';
    var sortMode = 'recent';  // 'recent' or 'alpha'
    var groupByLayer = true;
    var collapsedGroups = {};
    var clientsCollapsed = false;

    // Layer display order and color mapping
    var layerOrder = [
        'TAK Friendly', 'TAK Hostile', 'TAK Suspect',
        'TAK Neutral', 'TAK Unknown', 'TAK Other',
        'Meshtastic',
    ];
    var layerColors = {
        'TAK Friendly': '#0066FF',
        'TAK Hostile': '#FF0000',
        'TAK Suspect': '#FF8C00',
        'TAK Neutral': '#00AA00',
        'TAK Unknown': '#CCCC00',
        'TAK Other': '#888888',
        'Meshtastic': '#00CCFF',
    };

    // ── Toolbar handlers ──────────────────────────────────────
    document.getElementById('sb-toolbar').addEventListener('click', function(e) {
        var btn = e.target.closest('.sb-sort-btn');
        if (!btn) return;
        var mode = btn.dataset.sort;
        if (mode === 'group') {
            // Toggle grouping
            groupByLayer = !groupByLayer;
            btn.classList.toggle('active', groupByLayer);
        } else {
            // Switch sort mode
            sortMode = mode;
            document.querySelectorAll('.sb-sort-btn[data-sort="recent"],.sb-sort-btn[data-sort="alpha"]')
                .forEach(function(b) { b.classList.toggle('active', b.dataset.sort === mode); });
        }
        renderSidebar();
    });

    // Toggle connected clients section
    document.getElementById('sb-clients-header').addEventListener('click', function() {
        clientsCollapsed = !clientsCollapsed;
        sbClientsSection.classList.toggle('collapsed', clientsCollapsed);
    });

    // Toggle mesh network section
    document.getElementById('sb-mesh-header').addEventListener('click', function() {
        meshCollapsed = !meshCollapsed;
        sbMeshSection.classList.toggle('collapsed', meshCollapsed);
    });

    // Trail duration control
    document.getElementById('sb-trail-duration').addEventListener('change', function() {
        fetch('/tak-map/api/tracker/trail-duration', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ duration: parseInt(this.value) })
        });
    });

    // Toggle sidebar
    sbToggle.addEventListener('click', function() {
        sidebar.classList.toggle('collapsed');
        var icon = sbToggle.querySelector('i');
        if (sidebar.classList.contains('collapsed')) {
            icon.className = 'fa fa-chevron-left';
        } else {
            icon.className = 'fa fa-chevron-right';
        }
        setTimeout(function() {
            if (typeof map !== 'undefined') map.invalidateSize();
        }, 50);
    });

    // Filter input
    sbSearch.addEventListener('input', function() {
        filter = this.value.toLowerCase();
        renderSidebar();
    });

    // Click handler for group headers and marker rows
    sbList.addEventListener('click', function(e) {
        var header = e.target.closest('.sb-group-header');
        if (header) {
            var group = header.parentElement;
            var layerName = group.dataset.layer;
            group.classList.toggle('collapsed');
            collapsedGroups[layerName] = group.classList.contains('collapsed');
            return;
        }
        var row = e.target.closest('.sb-marker');
        if (row && typeof map !== 'undefined') {
            var lat = parseFloat(row.dataset.lat);
            var lon = parseFloat(row.dataset.lon);
            if (!isNaN(lat) && !isNaN(lon)) {
                map.flyTo([lat, lon], Math.max(map.getZoom(), 14), { duration: 0.8 });
                var name = row.dataset.name;
                if (typeof markers !== 'undefined' && markers[name]) {
                    setTimeout(function() { markers[name].openPopup(); }, 900);
                }
            }
        }
    });

    // ── Helpers ────────────────────────────────────────────────
    function formatAge(ms) {
        if (ms < 0) return '';
        var sec = Math.floor(ms / 1000);
        if (sec < 60) return sec + 's';
        var min = Math.floor(sec / 60);
        if (min < 60) return min + 'm';
        var hr = Math.floor(min / 60);
        if (hr < 24) return hr + 'h ' + (min % 60) + 'm';
        return Math.floor(hr / 24) + 'd';
    }

    function collectMarkers() {
        if (typeof allData === 'undefined') return [];
        var items = [];
        var keys = Object.keys(allData);
        for (var i = 0; i < keys.length; i++) {
            var d = allData[keys[i]];
            if (!d || !d.lat || !d.lon) continue;
            if (keys[i].indexOf('_seed_') === 0 || d._internal) continue;
            if (d.name === 'CrypTAK-WebMap') continue;

            var name = d.name || keys[i];
            var nameLC = name.toLowerCase();
            var layer = d.layer || 'Other';

            if (filter && nameLC.indexOf(filter) === -1 &&
                layer.toLowerCase().indexOf(filter) === -1) continue;

            items.push({
                name: name,
                lat: d.lat,
                lon: d.lon,
                layer: layer,
                icon: d.icon || (d.SIDC ? null : 'fa-question-circle'),
                SIDC: d.SIDC || null,
                color: d.iconColor || layerColors[layer] || '#888',
                opacity: d.opacity !== undefined ? d.opacity : 1,
                startMs: d._startMs || 0,
                staleMs: d._staleMs || 0,
                battery: d._battery || 0,
                mesh: d._mesh || null,
            });
        }
        return items;
    }

    function sortItems(items) {
        if (sortMode === 'recent') {
            items.sort(function(a, b) { return b.startMs - a.startMs; });
        } else {
            items.sort(function(a, b) { return a.name.localeCompare(b.name); });
        }
    }

    function esc(s) {
        return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')
            .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // Unified SNR color scale — matches cot-maps.js snrToLinkStyle() thresholds
    function snrColor(snr) {
        if (snr >= 5)  return '#00DD00';
        if (snr >= 0)  return '#AADD00';
        if (snr >= -7) return '#FFAA00';
        return '#FF4444';
    }

    function renderMarkerRow(m, now) {
        var age = m.startMs > 0 ? formatAge(now - m.startMs) : '';

        var opStyle = m.opacity < 1 ? 'opacity:' + m.opacity + ';' : '';
        var html = '<div class="sb-marker" data-name="' + m.name.replace(/"/g, '&quot;') +
            '" data-lat="' + m.lat + '" data-lon="' + m.lon + '"' +
            (opStyle ? ' style="' + opStyle + '"' : '') + '>';

        // Render SIDC milsymbol or fall back to Font Awesome icon
        if (m.SIDC && typeof ms !== 'undefined') {
            try {
                var sym = new ms.Symbol(m.SIDC, { size: 20 });
                var svgStr = sym.asSVG();
                html += '<div class="sb-marker-icon" style="width:28px;height:28px;display:flex;align-items:center;justify-content:center;">' + svgStr + '</div>';
            } catch(e) {
                html += '<div class="sb-marker-icon" style="color:' + m.color + '">' +
                    '<i class="fa fa-question-circle"></i></div>';
            }
        } else {
            var iconName = m.icon || 'fa-question-circle';
            html += '<div class="sb-marker-icon" style="color:' + m.color + '">' +
                '<i class="fa ' + iconName + '"></i></div>';
        }
        html += '<div class="sb-marker-info">';
        html += '<div class="sb-marker-name">' + esc(m.name) + '</div>';
        var meta = m.lat.toFixed(4) + ', ' + m.lon.toFixed(4);
        if (m.battery > 100) meta += ' (USB)';
        else if (m.battery > 0) meta += ' (' + m.battery + '%)';
        html += '<div class="sb-marker-meta">' + meta + '</div>';
        html += '</div>';
        if (age) html += '<span class="sb-marker-age">' + age + '</span>';
        if (m.mesh && m.mesh.snr !== null) {
            html += '<span class="sb-signal" title="SNR: ' + m.mesh.snr.toFixed(1) +
                ' dB" style="color:' + snrColor(m.mesh.snr) +
                '"><i class="fa fa-circle"></i></span>';
        }
        html += '</div>';
        return html;
    }

    // ── Mesh network status panel ─────────────────────────────
    // HW_MODELS and ROLES now live in cot-maps.js (server-side).
    // The mesh API resolves names server-side; these are kept as fallback only.
    var HW_MODELS = {
        0:'?', 4:'T-Beam', 6:'Heltec', 8:'Heltec', 9:'NanoG1',
        10:'RAK4631', 17:'Heltec V3', 24:'NanoG1', 37:'RAK',
        43:'RAK', 57:'T-Echo', 65:'RAK', 68:'T-Beam S3',
        113:'Heltec V3'
    };
    var ROLES = {
        0:'CLIENT', 1:'MUTE', 2:'ROUTER', 3:'RTR+CLI',
        4:'TRACKER', 5:'RPTR', 6:'TAK'
    };
    var sbMeshNodes         = document.getElementById('sb-mesh-nodes');
    var sbMeshCommToggle    = document.getElementById('sb-mesh-community-toggle');
    var sbMeshCommNodes     = document.getElementById('sb-mesh-community-nodes');
    var sbMeshLastUpdate    = document.getElementById('sb-mesh-last-update');
    var meshCommShowing     = false;

    sbMeshCommToggle.addEventListener('click', function() {
        meshCommShowing = !meshCommShowing;
        sbMeshCommNodes.style.display = meshCommShowing ? '' : 'none';
        sbMeshCommToggle.textContent = (meshCommShowing ? '▾ ' : '▸ ') +
            sbMeshCommToggle.dataset.label;
    });

    var sbMeshSummary = document.getElementById('sb-mesh-summary');

    // meshSnrColor removed — use unified snrColor() everywhere

    function fmtUptime(secs) {
        if (!secs) return '—';
        if (secs < 3600)  return Math.floor(secs/60) + 'm';
        if (secs < 86400) return Math.floor(secs/3600) + 'h ' + Math.floor((secs%3600)/60) + 'm';
        return Math.floor(secs/86400) + 'd ' + Math.floor((secs%86400)/3600) + 'h';
    }

    function meshNodeRow(n, nowSec) {
        var ageSec = n.lastHeard ? nowSec - n.lastHeard : null;
        var stCls, stDot;
        if (ageSec === null || ageSec > 86400)  { stCls = 'mesh-st-old';    stDot = '·'; }
        else if (ageSec > 7200)                 { stCls = 'mesh-st-stale';  stDot = '○'; }
        else if (ageSec > 900)                  { stCls = 'mesh-st-recent'; stDot = '◉'; }
        else                                    { stCls = 'mesh-st-online'; stDot = '●'; }

        var ageStr = '';
        if (ageSec !== null) {
            if (ageSec < 60)         ageStr = ageSec + 's';
            else if (ageSec < 3600)  ageStr = Math.floor(ageSec/60) + 'm';
            else if (ageSec < 86400) ageStr = Math.floor(ageSec/3600) + 'h';
            else                     ageStr = Math.floor(ageSec/86400) + 'd';
        }

        // Reboot indicator — uptime < 5 min
        var rebootFlag = (n.uptime > 0 && n.uptime < 300) ?
            ' <span class="mesh-reboot" title="Uptime: ' + n.uptime + 's — recently rebooted">↺</span>' : '';

        // Battery: 101 = POWER_PLUGGED_IN in Meshtastic proto
        var batStr = '', batCls = '';
        if (n.battery > 100) {
            batStr = '⚡USB'; batCls = 'bat-usb';
        } else if (n.battery > 0) {
            batStr = n.battery + '%';
            batCls = n.battery < 20 ? 'bat-crit' : n.battery < 50 ? 'bat-low' : 'bat-ok';
        }

        var role = n.role !== null ? (ROLES[n.role] || 'R' + n.role) : '';
        var hops = '';
        if (n.hopsToBridge !== null)
            hops = n.hopsToBridge === 0 ? 'direct' : n.hopsToBridge + ' hop' + (n.hopsToBridge !== 1 ? 's' : '');

        var snrC = n.snrToBridge !== null ? snrColor(n.snrToBridge) : '#555';

        // Meta line: role + hops on left (gray), battery + SNR on right (colored)
        var hwModel = n.hwModel !== null ? (HW_MODELS[n.hwModel] || 'HW' + n.hwModel) : '';
        var leftParts = [hwModel, role, hops].filter(Boolean);
        var rightParts = [];
        if (batStr) rightParts.push('<span class="' + batCls + '">' + batStr + '</span>');
        if (n.bridge)
            rightParts.push('<span class="mesh-bridge-badge">BRIDGE</span>');
        if (n.snrToBridge !== null)
            rightParts.push('<span style="color:' + snrC + '">' + n.snrToBridge.toFixed(1) + 'dB</span>');

        var metaLeft  = '<span style="color:#555">' + esc(leftParts.join(' · ')) + '</span>';
        var metaRight = rightParts.join('<span style="color:#444"> · </span>');
        var metaSep   = leftParts.length && rightParts.length ? '<span style="color:#444"> · </span>' : '';
        var metaHtml  = metaLeft + metaSep + metaRight;

        // Hover tooltip with extended telemetry
        var tip = [];
        if (n.voltage > 0)       tip.push('Voltage: ' + n.voltage.toFixed(2) + 'V');
        if (n.rssi !== null)     tip.push('RSSI: ' + n.rssi + ' dBm');
        if (n.channelUtil > 0)   tip.push('Ch util: ' + n.channelUtil.toFixed(1) + '%');
        if (n.airUtilTx > 0)    tip.push('TX air: ' + n.airUtilTx.toFixed(2) + '%');
        if (n.uptime > 0)        tip.push('Up: ' + fmtUptime(n.uptime));
        var tipAttr = tip.length ? ' title="' + tip.join(' · ').replace(/"/g, '&quot;') + '"' : '';

        var shortTag = n.shortName ? ' <span style="color:#555;font-size:10px">' + esc(n.shortName) + '</span>' : '';

        return '<div class="sb-mesh-node"' + tipAttr + '>' +
            '<div class="sb-mesh-node-dot ' + stCls + '">' + stDot + '</div>' +
            '<div class="sb-mesh-node-info">' +
            '<div class="sb-mesh-node-name' + (n.owned ? ' owned' : '') + '">' +
            esc(n.name) + shortTag + rebootFlag + '</div>' +
            '<div class="sb-mesh-node-meta">' + metaHtml + '</div></div>' +
            '<div class="sb-mesh-node-age">' + ageStr + '</div></div>';
    }

    function renderMeshPanel(nodes, fetchTs) {
        var count = nodes.length;
        sbMeshCount.textContent = count;
        sbMeshCount.classList.toggle('zero', count === 0);

        if (count === 0) {
            sbMeshSummary.style.display = 'none';
            sbMeshNodes.innerHTML = '<div style="padding:6px 26px;color:#555;font-size:12px;">No mesh nodes heard</div>';
            sbMeshCommToggle.style.display = 'none';
            sbMeshCommNodes.style.display = 'none';
            sbMeshLastUpdate.textContent = '';
            return;
        }

        var nowSec = Math.floor(Date.now() / 1000);
        var owned     = nodes.filter(function(n) { return n.owned; });
        var community = nodes.filter(function(n) { return !n.owned; });

        // ── Mesh health summary bar ───────────────────────────
        var lowBat = owned.filter(function(n) {
            return n.battery > 0 && n.battery <= 100 && n.battery < 25;
        });
        var recentOwned = owned.filter(function(n) {
            return n.lastHeard && (nowSec - n.lastHeard) < 3600;
        });
        var utils = recentOwned.map(function(n) { return n.channelUtil; }).filter(function(u) { return u > 0; });
        var summaryParts = [];
        if (lowBat.length > 0)
            summaryParts.push('<span class="mesh-alert">⚠ ' + lowBat.length + ' low bat</span>');
        if (utils.length > 0) {
            var uMin = Math.min.apply(null, utils), uMax = Math.max.apply(null, utils);
            var uCls = uMax > 20 ? 'mesh-alert' : uMax > 10 ? 'mesh-warn' : '';
            var uStr = 'ch ' + uMin.toFixed(0) + '–' + uMax.toFixed(0) + '%';
            summaryParts.push(uCls ? '<span class="' + uCls + '">' + uStr + '</span>' :
                '<span style="color:#555">' + uStr + '</span>');
        }
        if (summaryParts.length) {
            sbMeshSummary.innerHTML = summaryParts.join('<span style="color:#333"> &nbsp; </span>');
            sbMeshSummary.style.display = '';
        } else {
            sbMeshSummary.style.display = 'none';
        }

        // ── Node rows ─────────────────────────────────────────
        var html = '';
        for (var i = 0; i < owned.length; i++) html += meshNodeRow(owned[i], nowSec);
        sbMeshNodes.innerHTML = html || '<div style="padding:6px 26px;color:#555;font-size:12px;">No owned nodes heard</div>';

        if (community.length > 0) {
            var label = 'Community (' + community.length + ')';
            sbMeshCommToggle.dataset.label = label;
            sbMeshCommToggle.textContent = (meshCommShowing ? '▾ ' : '▸ ') + label;
            sbMeshCommToggle.style.display = '';
            if (meshCommShowing) {
                var cHtml = '';
                for (var j = 0; j < community.length; j++) cHtml += meshNodeRow(community[j], nowSec);
                sbMeshCommNodes.innerHTML = cHtml;
                sbMeshCommNodes.style.display = '';
            }
        } else {
            sbMeshCommToggle.style.display = 'none';
            sbMeshCommNodes.style.display = 'none';
        }

        sbMeshLastUpdate.textContent = 'Updated ' + new Date(fetchTs).toLocaleTimeString();
    }

    function fetchMeshNodes() {
        fetch('/tak-map/api/mesh/nodes')
            .then(function(r) { return r.ok ? r.json() : { nodes: [] }; })
            .then(function(d) { renderMeshPanel(d.nodes || [], d.ts || Date.now()); })
            .catch(function() {});
    }

    // ── Connected clients ─────────────────────────────────────
    function fetchClients() {
        fetch('/tak-map/api/clients')
            .then(function(r) { return r.ok ? r.json() : { clients: [] }; })
            .then(function(data) { renderClients(data.clients || []); })
            .catch(function() { renderClients([]); });
    }

    function renderClients(clients) {
        var count = clients.length;
        sbClientCount.textContent = count;
        sbClientCount.classList.toggle('zero', count === 0);

        if (count === 0) {
            sbClientsList.innerHTML = '<div style="padding:6px 26px;color:#555;font-size:12px;">No ATAK clients connected</div>';
            return;
        }

        var html = '';
        for (var i = 0; i < clients.length; i++) {
            var c = clients[i];
            var hasLoc = c.lat !== null && c.lon !== null;
            html += '<div class="sb-client-row' + (hasLoc ? ' has-loc' : '') + '"';
            if (hasLoc) {
                html += ' data-lat="' + c.lat + '" data-lon="' + c.lon + '"';
                html += ' data-name="' + (c.callsign || '').replace(/"/g, '&quot;') + '"';
            }
            html += '>';
            html += '<span class="sb-client-icon sb-client-online"><i class="fa fa-circle"></i></span>';
            html += '<span class="sb-client-name">' + esc(c.callsign || 'Unknown') + '</span>';
            if (!hasLoc) {
                html += '<span class="sb-client-loc-badge">no loc</span>';
            } else {
                html += '<span class="sb-client-loc-badge"><i class="fa fa-crosshairs"></i></span>';
            }
            html += '</div>';
        }
        sbClientsList.innerHTML = html;
    }

    // Click-to-fly for client rows with position
    sbClientsList.addEventListener('click', function(e) {
        var row = e.target.closest('.sb-client-row.has-loc');
        if (row && typeof map !== 'undefined') {
            var lat = parseFloat(row.dataset.lat);
            var lon = parseFloat(row.dataset.lon);
            if (!isNaN(lat) && !isNaN(lon)) {
                map.flyTo([lat, lon], Math.max(map.getZoom(), 14), { duration: 0.8 });
                var name = row.dataset.name;
                if (typeof markers !== 'undefined' && markers[name]) {
                    setTimeout(function() { markers[name].openPopup(); }, 900);
                }
            }
        }
    });

    // ── Mesh health summary (legacy stub — replaced by renderMeshPanel) ─
    function renderMeshHealth(items) {
        var meshNodes = [];
        for (var i = 0; i < items.length; i++) {
            if (items[i].mesh) meshNodes.push(items[i]);
        }

        var count = meshNodes.length;
        sbMeshCount.textContent = count;
        sbMeshCount.classList.toggle('zero', count === 0);

        if (count === 0) {
            sbMeshSection.style.display = 'none';
            return;
        }
        sbMeshSection.style.display = '';

        var totalUtil = 0;
        var peakUtil = 0;
        var peakName = '';
        var utilCount = 0;
        for (var j = 0; j < meshNodes.length; j++) {
            var ch = meshNodes[j].mesh.channelUtil;
            if (ch > 0) {
                totalUtil += ch;
                utilCount++;
                if (ch > peakUtil) {
                    peakUtil = ch;
                    peakName = meshNodes[j].name;
                }
            }
        }

        var html = '';
        html += '<div class="sb-mesh-stat"><span>Nodes reporting</span>' +
            '<span class="sb-mesh-stat-val">' + count + '</span></div>';

        if (utilCount > 0) {
            var avgUtil = totalUtil / utilCount;
            html += '<div class="sb-mesh-stat"><span>Channel util</span>' +
                '<span class="sb-mesh-stat-val">' + avgUtil.toFixed(1) +
                '% avg &middot; ' + peakUtil.toFixed(1) + '% peak</span></div>';

            // Bar: color by peak utilization
            var barColor = peakUtil < 15 ? '#4CAF50' : peakUtil < 25 ? '#FFD600' : '#FF5252';
            html += '<div class="sb-mesh-bar-wrap">' +
                '<div class="sb-mesh-bar" style="width:' + Math.min(peakUtil, 100) +
                '%;background:' + barColor + '" title="Peak: ' +
                esc(peakName) + '"></div></div>';
        }

        sbMeshBody.innerHTML = html;
    }

    // ── Main render ───────────────────────────────────────────
    function renderSidebar() {
        var items = collectMarkers();
        var now = Date.now();

        if (items.length === 0) {
            sbList.innerHTML = '<div class="sb-empty">' +
                (filter ? 'No matches for "' + esc(filter) + '"' : 'No markers') + '</div>';
            sbSummary.textContent = filter ? '0 matching' : 'No markers';
            return;
        }

        var html = '';

        if (groupByLayer) {
            // Group items by layer
            var groups = {};
            for (var i = 0; i < items.length; i++) {
                var layer = items[i].layer;
                if (!groups[layer]) groups[layer] = [];
                groups[layer].push(items[i]);
            }
            // Sort layer groups
            var sortedLayers = Object.keys(groups).sort(function(a, b) {
                var ia = layerOrder.indexOf(a); if (ia === -1) ia = 999;
                var ib = layerOrder.indexOf(b); if (ib === -1) ib = 999;
                return ia - ib;
            });
            var layerCount = sortedLayers.length;
            for (var li = 0; li < sortedLayers.length; li++) {
                var layerName = sortedLayers[li];
                var groupItems = groups[layerName];
                sortItems(groupItems);
                var isCollapsed = collapsedGroups[layerName] || false;

                html += '<div class="sb-group' + (isCollapsed ? ' collapsed' : '') +
                    '" data-layer="' + layerName + '">';
                html += '<div class="sb-group-header">';
                html += '<span class="sb-group-caret"><i class="fa fa-caret-down"></i></span>';
                html += '<span class="sb-group-label">' + layerName + '</span>';
                html += '<span class="sb-group-count">' + groupItems.length + '</span>';
                html += '</div><div class="sb-group-items">';
                for (var mi = 0; mi < groupItems.length; mi++) {
                    html += renderMarkerRow(groupItems[mi], now);
                }
                html += '</div></div>';
            }
            sbSummary.textContent = items.length + ' marker' + (items.length !== 1 ? 's' : '') +
                (filter ? ' matching' : '') + ' across ' +
                layerCount + ' layer' + (layerCount !== 1 ? 's' : '');
        } else {
            // Flat list — no grouping
            sortItems(items);
            for (var fi = 0; fi < items.length; fi++) {
                html += renderMarkerRow(items[fi], now);
            }
            sbSummary.textContent = items.length + ' marker' + (items.length !== 1 ? 's' : '') +
                (filter ? ' matching' : '');
        }

        sbList.innerHTML = html;
    }

    // ── Marker opacity sync ─────────────────────────────────
    // worldmap.js ignores data.opacity when creating L.marker instances.
    // We apply it here via Leaflet's setOpacity() API every 2 seconds.
    function syncMarkerOpacity() {
        if (typeof markers === 'undefined' || typeof allData === 'undefined') return;
        var keys = Object.keys(allData);
        for (var i = 0; i < keys.length; i++) {
            var d = allData[keys[i]];
            if (!d || d.opacity === undefined) continue;
            var m = markers[d.name || keys[i]];
            if (m && typeof m.setOpacity === 'function') {
                m.setOpacity(d.opacity);
            }
        }
    }

    // ── Init ──────────────────────────────────────────────────
    // Set initial group toggle state
    sbGroupToggle.classList.add('active');

    var initInterval = setInterval(function() {
        if (typeof allData !== 'undefined' && typeof map !== 'undefined') {
            clearInterval(initInterval);
            map.invalidateSize();
            renderSidebar();
            setInterval(function() {
                renderSidebar();
                syncMarkerOpacity();
            }, 2000);
            fetchClients();
            setInterval(fetchClients, 10000);
            fetchMeshNodes();
            setInterval(fetchMeshNodes, 30000);

            // Apply opacity immediately when worldmap.js adds/recreates markers,
            // eliminating the flash of full-opacity before the next 2s poll.
            var opacitySyncPending = false;
            map.on('layeradd', function(e) {
                if (!(e.layer instanceof L.Marker) || opacitySyncPending) return;
                opacitySyncPending = true;
                setTimeout(function() {
                    opacitySyncPending = false;
                    syncMarkerOpacity();
                }, 50);
            });
        }
    }, 500);
})();
</script>
</body>
</html>
