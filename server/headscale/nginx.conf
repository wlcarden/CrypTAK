worker_processes 1;
pid /tmp/nginx.pid;
error_log /tmp/nginx-debug.log debug;
events { worker_connections 1024; }

http {
    log_format tailscale_debug '$remote_addr "$request" status=$status '
                               'upgrade="$http_upgrade" '
                               'ws_proto="$http_sec_websocket_protocol" '
                               'hs="$http_x_tailscale_handshake"';
    access_log /tmp/nginx-access.log tailscale_debug;

    # Map used for non-ts2021 paths: pass Upgrade if present, close if not
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # For /ts2021: always force Upgrade: tailscale-control-protocol regardless of
    # what the client sent. Android Tailscale (via cloudflared) sends Upgrade: websocket,
    # which makes headscale call acceptWebsocket — that path requires GET method, but
    # all Tailscale clients use POST. headscale's tailscale-control-protocol path (AcceptHTTP)
    # accepts POST and reads X-Tailscale-Handshake from the request header directly.
    # All clients (Android, Linux) send X-Tailscale-Handshake as a header, so this works.
    map $http_upgrade $ts_upgrade {
        default  "tailscale-control-protocol";
    }

    # Direct TLS server — Tailscale clients connect here via port forward.
    # No Cloudflare in the path, so X-Tailscale-Handshake header is preserved.
    server {
        listen 443 ssl;
        ssl_certificate /etc/letsencrypt/live/vpn.thousand-pikes.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/vpn.thousand-pikes.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        resolver 127.0.0.11 valid=10s;
        set $headscale_upstream http://headscale:8080;
        set $authelia_upstream http://authelia:9091;

        location /ts2021 {
            proxy_pass $headscale_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $ts_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header X-Tailscale-Handshake $http_x_tailscale_handshake;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        location /auth/ {
            proxy_pass $authelia_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        location / {
            proxy_pass $headscale_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 86400s;
        }
    }

    # Cloudflared HTTP server — kept as fallback for Cloudflare tunnel traffic.
    server {
        listen 8080;

        # Resolve upstreams at request time (not startup) so nginx survives
        # headscale/authelia restarts without failing to start.
        resolver 127.0.0.11 valid=10s;
        set $headscale_upstream http://headscale:8080;
        set $authelia_upstream http://authelia:9091;

        # TS2021 noise protocol — force Upgrade: tailscale-control-protocol always.
        #
        # headscale has two code paths in controlhttpserver.AcceptHTTP:
        #   1. Upgrade: websocket → acceptWebsocket (nhooyr.io/websocket.Accept)
        #      Requires GET method. Reads handshake from r.Form (URL query param).
        #   2. Upgrade: tailscale-control-protocol → AcceptHTTP inline
        #      Accepts POST. Reads handshake from r.Header.Get("X-Tailscale-Handshake").
        #
        # All Tailscale clients use POST and send X-Tailscale-Handshake as a header.
        # Android Tailscale (via cloudflared) sends Upgrade: websocket with POST,
        # which hits path #1 and fails (needs GET). Always injecting
        # tailscale-control-protocol forces path #2, which is correct for all clients.
        #
        # X-Tailscale-Handshake may be listed as hop-by-hop in the Connection header;
        # explicitly re-inject it so nginx doesn't strip it.
        location /ts2021 {
            proxy_pass $headscale_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $ts_upgrade;
            proxy_set_header Connection "Upgrade";
            # Explicitly re-inject X-Tailscale-Handshake: the client may list it
            # as hop-by-hop in the Connection header, causing nginx to strip it.
            proxy_set_header X-Tailscale-Handshake $http_x_tailscale_handshake;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Authelia OIDC login portal — handles browser-based VPN enrollment.
        # Phone Tailscale "Log In" → headscale redirects browser here → user enters credentials.
        #
        # X-Forwarded-Proto MUST be hardcoded to https: all traffic arrives via Cloudflare
        # (TLS terminates at the edge), so cloudflared→nginx is plain HTTP and $scheme='http'.
        # Authelia builds its OIDC issuer URL from Host + X-Forwarded-Proto; if the issuer
        # returns as http:// it won't match headscale's configured issuer (https://).
        location /auth/ {
            proxy_pass $authelia_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # All other Headscale endpoints (registration, key fetch, DERP, etc.)
        location / {
            proxy_pass $headscale_upstream;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
        }
    }
}
