# FreeTAKServer full stack — Unraid deployment
# Four containers: core FTS + FTS-UI (admin panel :5000) + Node-RED webmap (:1880/tak-map) + Mosquitto MQTT broker (:1883)
#
# Usage:
#   cp .env.example .env
#   edit .env  — set UNRAID_IP and all passwords
#   docker compose up -d freetakserver          # start core first (wait ~60s)
#   # Default API key is literally "Bearer token" — set in .env:
#   #   FTS_API_KEY=Bearer token
#   # Change via FTS-UI at :5000 after first login (admin/password)
#   docker compose up -d freetakserver-ui

services:
  freetakserver:
    image: ghcr.io/freetakteam/freetakserver:latest
    container_name: freetakserver
    hostname: freetakserver
    restart: always
    networks:
      - taknet
    ports:
      - "8087:8087"      # CoT TCP  — ATAK client connections
      - "8089:8089"      # CoT SSL  — encrypted client connections
      - "8080:8080"      # Data Package HTTP
      - "8443:8443"      # Data Package HTTPS
      - "127.0.0.1:19023:19023"  # REST API — localhost only; FTS-UI reaches via taknet
      - "127.0.0.1:9000:9000"  # Federation — server-to-server linking; localhost-only until needed
    deploy:
      resources:
        limits:
          memory: 1g
    volumes:
      - /mnt/user/appdata/fts/data:/opt/fts
      # FTS 2.2.1 patch: use session.merge() (UPSERT) instead of session.add() (INSERT-only)
      # to prevent SQLAlchemy session corruption on client reconnects.
      - /mnt/user/appdata/fts/table_controllers_patched.py:/home/freetak/FreeTAKServer/core/persistence/table_controllers.py:ro
      # FTS 2.2.1 patch: EventTableController.create() overrides base class with its own session.add(row).
      # Must also patch this file; the table_controllers.py patch alone is insufficient.
      - /mnt/user/appdata/fts/event_table_controller_patched.py:/home/freetak/FreeTAKServer/core/persistence/EventTableController.py:ro
      # FTS 2.2.1 patch: relay code never removes dead connections from self.connections dict.
      # Disconnection handler only cleans client_information_queue, not connections.
      # This patch auto-removes dead sockets on relay failure instead of spamming Bad fd errors.
      - /mnt/user/appdata/fts/send_component_data_controller_patched.py:/home/freetak/FreeTAKServer/services/tcp_cot_service/controllers/send_component_data_controller.py:ro
      # FTS 2.2.1 patch: AllowedCLIIPs config setting removed from schema but REST API still
      # references it. Without this patch, /Clients and other endpoints return 500.
      - /mnt/user/appdata/fts/MainConfig_patched.py:/home/freetak/FreeTAKServer/core/configuration/MainConfig.py:ro
      # FTS 2.2.1 patch: CreateLoggerController only handles log levels "info", "error", "debug".
      # Any other value (e.g. "warning") leaves log_level unbound → UnboundLocalError on Python 3.12+.
      # Patch adds default log_level=WARNING and an explicit "warning" branch.
      - /mnt/user/appdata/fts/CreateLoggerController_patched.py:/home/freetak/FreeTAKServer/core/configuration/CreateLoggerController.py:ro
    environment:
      # Ports
      FTS_COT_PORT: 8087
      FTS_SSLCOT_PORT: 8089
      FTS_API_PORT: 19023
      FTS_FED_PORT: 9000

      # FTS_DP_ADDRESS = external IP — embedded in data-package download URLs ATAK fetches.
      # FTS_USER_ADDRESS / FTS_API_ADDRESS = bind address inside container — use 0.0.0.0;
      # Docker port-maps these outward. Do NOT set to the external IP (bind will fail).
      FTS_DP_ADDRESS: ${UNRAID_IP}
      FTS_USER_ADDRESS: "0.0.0.0"
      FTS_API_ADDRESS: "0.0.0.0"

      # Internal microservices routing (FTS 2.x — do not expose these ports on host)
      FTS_ROUTING_PROXY_SUBSCRIBE_PORT: 19030
      FTS_ROUTING_PROXY_SUBSCRIBE_IP: "freetakserver"
      FTS_ROUTING_PROXY_PUBLISHER_PORT: 19032
      FTS_ROUTING_PROXY_PUBLISHER_IP: "freetakserver"
      FTS_ROUTING_PROXY_SERVER_PORT: 19031
      FTS_ROUTING_PROXY_SERVER_IP: "freetakserver"
      FTS_INTEGRATION_MANAGER_PULLER_PORT: 19033
      FTS_INTEGRATION_MANAGER_PULLER_ADDRESS: "freetakserver"
      FTS_INTEGRATION_MANAGER_PUBLISHER_PORT: 19034
      FTS_INTEGRATION_MANAGER_PUBLISHER_ADDRESS: "freetakserver"

      # Security — all must be changed from defaults before first boot
      FTS_FED_PASSWORD: ${FTS_FED_PASSWORD}
      FTS_CLIENT_CERT_PASSWORD: ${FTS_CLIENT_CERT_PASSWORD}
      FTS_WEBSOCKET_KEY: ${FTS_WEBSOCKET_KEY}
      FTS_SECRET_KEY: ${FTS_SECRET_KEY}

      # Behavior
      # FTS_CONNECTION_MESSAGE disabled — FTS 2.2.1 IAMUsersController CoT encoding bug:
      # setting this causes 'bytes-like object required, not NoneType' on every client connect,
      # which drops the socket immediately after the welcome is sent.
      # FTS_CONNECTION_MESSAGE: "Welcome to Meshtastic-ATAK mesh"
      FTS_COT_TO_DB: "true"
      FTS_OPTIMIZE_API: "true"
      FTS_LOG_LEVEL: "info"
      FTS_EMERGENCY_RADIUS: 0
      FTS_NUM_ROUTING_WORKERS: 3
      FTS_MAINLOOP_DELAY: 100

    # Healthcheck disabled: Docker's exec-based healthchecks fail on Unraid due to a
    # runc state directory issue (/run/user/0/ missing in daemon context). The service
    # IS healthy — verify manually: python3 -c "import socket; s=socket.socket();
    # s.connect(('localhost',8087))" should succeed ~60s after container start.
    healthcheck:
      disable: true

  freetakserver-ui:
    image: ghcr.io/freetakteam/ui:latest
    container_name: freetakserver-ui
    hostname: freetakserver-ui
    restart: always
    depends_on:
      freetakserver:
        condition: service_started    # service_healthy unavailable — healthcheck disabled on Unraid
    networks:
      - taknet
    ports:
      - "127.0.0.1:5000:5000"  # Admin web panel — localhost only; SSH tunnel to access
    volumes:
      - /mnt/user/appdata/fts-ui/data:/home/freetak/data
      # socket.io v3 shim — FTS-UI ships v1.4.5 (EIO=3) which is incompatible with FTS core 2.x Flask-SocketIO 5.x (EIO=4).
      # Flask serves from the pip-installed package path, NOT the source tree. Both paths needed.
      - /mnt/user/appdata/fts-ui/socket.io.v4.min.js:/home/freetak/FreeTAKServer-UI/app/base/static/assets/js/socket.io-1.4.5.js
      - /mnt/user/appdata/fts-ui/socket.io.v4.min.js:/home/freetak/.local/lib/python3.11/site-packages/FreeTAKServer-UI/app/base/static/assets/js/socket.io-1.4.5.js
    environment:
      FTS_IP: ${UNRAID_IP}               # External IP — what browsers use to reach FTS
      FTS_API_PORT: 19023
      FTS_API_PROTO: "http"
      FTS_UI_EXPOSED_IP: "freetakserver-ui"
      FTS_UI_PORT: 5000
      FTS_UI_WSKEY: ${FTS_WEBSOCKET_KEY}
      FTS_API_KEY: ${FTS_API_KEY}        # Default: "Bearer token" — change via FTS-UI after first login
      FTS_UI_SQLALCHEMY_DATABASE_URI: "sqlite:////home/freetak/data/FTSServer-UI.db"
      # Webmap iframe: points FTS-UI to Node-RED worldmap serving at /tak-map
      FTS_MAP_EXPOSED_IP: ${UNRAID_IP}   # Browser-facing IP for the iframe src
      FTS_MAP_PORT: 1880
      FTS_MAP_PROTO: "http"
    deploy:
      resources:
        limits:
          memory: 512m

  nodered:
    image: nodered/node-red:4.1
    container_name: nodered
    restart: always
    depends_on:
      - mosquitto
    networks:
      - taknet
    ports:
      - "1880:1880"          # Node-RED UI + worldmap at /tak-map
    volumes:
      - /mnt/user/appdata/nodered/data:/data
      - ./nodered/settings.js:/data/settings.js:ro  # functionGlobalContext (net, cotMaps)
      - ./nodered/lib:/opt/cot-maps:ro               # cot-maps.js module
      - ./nodered/public:/data/public:ro              # favicon.ico, cryptak-logo.png
      - /mnt/cache/appdata/tak-server/nodered/webmap/index.html:/data/node_modules/node-red-contrib-web-worldmap/worldmap/index.html:ro
    environment:
      NR_ADMIN_PASS: ${NR_ADMIN_PASS:-}    # Set in .env to enable admin auth; blank = no auth
    user: "1000:1000"
    # Healthcheck disabled: same Unraid runc issue as FTS (see freetakserver comment).
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          memory: 512m

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: always
    networks:
      - taknet
    ports:
      - "0.0.0.0:1883:1883"  # MQTT — LAN-accessible for Meshtastic T-Beam bridge; auth required (no anonymous)
    volumes:
      - /mnt/user/appdata/mosquitto/config:/mosquitto/config
      - /mnt/user/appdata/mosquitto/data:/mosquitto/data
      - /mnt/user/appdata/mosquitto/log:/mosquitto/log
    deploy:
      resources:
        limits:
          memory: 256m

  # ── Meshtastic → TAK Relay ───────────────────────────────────────────────────
  #
  # Connects to the T-Beam bridge node (via WiFi TCP or USB serial), subscribes
  # to mesh position packets, converts them to CoT XML, and injects into FTS.
  # Mesh nodes appear as friendly PLI markers on the TAK map.
  #
  # Set MESH_HOST in .env to the T-Beam's IP (default: 192.168.50.198).
  # For USB serial: set MESH_SERIAL=/dev/ttyUSB0 and add devices mapping.
  mesh-relay:
    build: ./mesh-relay
    container_name: mesh-relay
    profiles: ["mesh-relay"]
    restart: always
    depends_on:
      freetakserver:
        condition: service_started
    networks:
      - taknet
    devices:
      - /dev/ttyACM0:/dev/ttyACM0    # T-Beam USB serial (more reliable than WiFi TCP)
    environment:
      MESH_SERIAL: /dev/ttyACM0       # Preferred — no WiFi dependency, no idle timeout
      MESH_HOST: ${MESH_HOST:-192.168.50.198}  # TCP fallback if serial device unavailable
      FTS_HOST: freetakserver
      FTS_PORT: "8087"
      FRIENDLY_NODES: "55c6ddbc,3db00f2c,a51e2838,c6eadff0,9aa4baf0"  # Our mesh nodes → friendly (blue)
      TRACKER_NODES: "${TRACKER_NODES:-01f94ec0}"  # GPS asset tags → suspect (orange), WebMap-controlled
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          memory: 256m

  # ── Headscale VPN stack ──────────────────────────────────────────────────────
  #
  # Headscale is a self-hosted replacement for Tailscale's coordination server.
  # It manages WireGuard keys and peer discovery for team devices without any
  # Tailscale accounts or fees. Team phones use the official Tailscale app
  # pointed at https://tak.thousand-pikes.com instead of Tailscale's cloud.
  #
  # Internet access paths:
  #   Direct TLS (preferred — preserves X-Tailscale-Handshake header):
  #     Phones ──TLS──► vpn.thousand-pikes.com:443 ──► router NAT ──► nginx:9443 ──► headscale:8080
  #   Cloudflare fallback (cannot complete ts2021 noise handshake):
  #     Phones ──HTTPS──► tak.thousand-pikes.com (Cloudflare) ──► nginx:8082 ──► headscale:8080
  #   After enrollment:
  #     Phones ──WireGuard P2P──► Tailscale on Unraid host ──► FTS ports
  #
  # OIDC enrollment path (browser-based, recommended for onboarding):
  #   Phone Tailscale app → "Log In" → nginx:8082/auth → Authelia login page
  #   → user enters credentials → Authelia → headscale OIDC callback → enrolled
  #
  # nginx sits between cloudflared and headscale to inject the correct Upgrade
  # header on /ts2021 and to proxy /auth/* to Authelia for OIDC enrollment.
  #
  # To enroll the Unraid host after Headscale is running, see README.

  authelia:
    image: ghcr.io/authelia/authelia:4.39
    container_name: authelia
    restart: always
    networks:
      - taknet
    volumes:
      # configuration.yml + users_database.yml + db.sqlite3 + notification.txt
      - /mnt/user/appdata/authelia:/config
      # RSA signing key + session/storage/hmac secrets (files, not env vars — avoids $ escaping)
      - /mnt/user/appdata/authelia/secrets:/secrets:ro
    environment:
      AUTHELIA_SESSION_SECRET_FILE: /secrets/session_secret
      AUTHELIA_STORAGE_ENCRYPTION_KEY_FILE: /secrets/storage_key
      AUTHELIA_IDENTITY_PROVIDERS_OIDC_HMAC_SECRET_FILE: /secrets/oidc_hmac_secret
      # client_secret is delivered via !secret directive in configuration.yml
    # No exposed ports — nginx proxies /auth/* internally
    deploy:
      resources:
        limits:
          memory: 512m

  headscale-nginx:
    image: ghcr.io/nginxinc/nginx-unprivileged:alpine
    container_name: headscale-nginx
    restart: always
    depends_on:
      - authelia
    cap_add:
      - NET_BIND_SERVICE
    networks:
      taknet:
        aliases:
          - vpn.thousand-pikes.com    # Headscale resolves OIDC issuer via Docker DNS
    ports:
      - "8082:8080"    # Control plane — cloudflared routes tak.thousand-pikes.com → :8082
      - "9443:443"     # Direct TLS — router port-forwards public :443 → :9443
    volumes:
      - ./headscale/nginx.conf:/etc/nginx/nginx.conf:ro
      - /mnt/user/appdata/letsencrypt:/etc/letsencrypt:ro
    deploy:
      resources:
        limits:
          memory: 256m

  headscale:
    image: ghcr.io/juanfont/headscale:0.28
    container_name: headscale
    restart: always
    depends_on:
      - headscale-nginx
    networks:
      - taknet
    ports:
      - "127.0.0.1:9090:9090"  # Prometheus metrics — localhost only; SSH tunnel to access
    volumes:
      - ./headscale:/etc/headscale              # config.yaml + acls.hujson (this repo)
      - /mnt/user/appdata/headscale:/var/lib/headscale  # keys, DB, node state — persists
    command: serve
    # No healthcheck — headscale image is distroless (no wget/curl/sh available)
    deploy:
      resources:
        limits:
          memory: 512m

  headscale-ui:
    image: ghcr.io/gurucomputing/headscale-ui:latest
    container_name: headscale-ui
    restart: always
    depends_on:
      - headscale
    networks:
      - taknet
    ports:
      - "127.0.0.1:8083:80"  # Admin web UI — localhost only; SSH tunnel to access
    deploy:
      resources:
        limits:
          memory: 256m

  # ── GitHub Actions Self-Hosted Runner ────────────────────────────────────────
  #
  # Registers with GitHub as a self-hosted runner so pushes to server/**
  # automatically deploy to this Unraid box. Requires GITHUB_RUNNER_TOKEN
  # (fine-grained PAT with Administration read/write) in .env.
  #
  # Docker socket mount lets the runner execute docker compose commands.
  # The runner auto-registers on start and deregisters on graceful stop.
  github-runner:
    image: myoung34/github-runner:latest
    container_name: github-runner
    restart: always
    environment:
      RUNNER_SCOPE: repo
      REPO_URL: https://github.com/wlcarden/CrypTAK
      ACCESS_TOKEN: ${GITHUB_RUNNER_TOKEN}
      RUNNER_NAME: unraid-cryptak
      RUNNER_WORKDIR: /tmp/runner
      LABELS: unraid,self-hosted
      DISABLE_AUTO_UPDATE: "true"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /mnt/user/appdata/github-runner:/tmp/runner
      - /mnt/user/appdata/tak-server:/mnt/user/appdata/tak-server
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          memory: 1g

  # ── Incident Tracker (optional) ──────────────────────────────────────────────
  #
  # Scrapes news feeds and structured alert sources (NWS weather, USGS earthquakes),
  # filters for relevance using keywords + optional AI analysis, and plots incidents
  # as markers on the TAK map via CoT injection to FTS.
  #
  # Not started by default. To enable:
  #   1. Edit incident-tracker/config.yaml — set your area, feeds, and keywords
  #   2. (Optional) Set ANTHROPIC_API_KEY in .env for AI-powered filtering
  #   3. docker compose --profile incident-tracker up -d
  incident-tracker:
    build: ./incident-tracker
    container_name: incident-tracker
    profiles: ["incident-tracker"]
    restart: always
    depends_on:
      freetakserver:
        condition: service_started
    networks:
      - taknet
    volumes:
      - ./incident-tracker/config.yaml:/app/config.yaml:ro
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          memory: 512m

networks:
  taknet:
    driver: bridge
