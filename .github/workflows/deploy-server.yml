name: Deploy Server Stack

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - '.github/workflows/deploy-server.yml'
  workflow_dispatch:

concurrency:
  group: deploy-server
  cancel-in-progress: false

env:
  DEPLOY_DIR: /mnt/user/appdata/tak-server
  NODERED_URL: http://host.docker.internal:1880

jobs:
  deploy:
    runs-on: [self-hosted, unraid]
    steps:
      - uses: actions/checkout@v4

      - name: Sync server files to deploy directory
        run: |
          rsync -av \
            --exclude='.env' \
            --exclude='config.local.yaml' \
            --exclude='docker-compose.override.yml' \
            server/ "$DEPLOY_DIR/"

      - name: Build local images
        working-directory: /mnt/user/appdata/tak-server
        run: |
          # Services with build: directives need explicit rebuild —
          # docker compose pull skips them (no remote image) and up -d
          # reuses the stale local image if the digest hasn't changed.
          docker compose --profile incident-tracker --profile mesh-relay build

      - name: Deploy server stack
        working-directory: /mnt/user/appdata/tak-server
        run: |
          # Exclude github-runner from deploy — recreating the runner's own
          # container mid-job kills the Actions process and cancels the run.
          # Update the runner manually on the server if its config changes.
          SERVICES=$(docker compose config --services | grep -v github-runner)
          docker compose pull $SERVICES
          docker compose up -d --remove-orphans $SERVICES
          # Profile services need explicit targeting — bare 'up -d' doesn't
          # start services in non-default profiles.
          docker compose --profile incident-tracker up -d --no-deps incident-tracker
          docker compose --profile mesh-relay up -d --no-deps mesh-relay

      - name: Wait for Node-RED to start
        run: |
          for i in $(seq 1 60); do
            if curl -sf "$NODERED_URL/settings" > /dev/null 2>&1; then
              echo "Node-RED ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::Node-RED not responding after 60s"
          exit 1

      - name: Deploy flows to Node-RED
        run: |
          # Node-RED reads flows from its /data volume, not the rsync'd repo copy.
          # Push repo flows via the admin API so they take effect immediately.
          HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' \
            -X POST "$NODERED_URL/flows" \
            -H 'Content-Type: application/json' \
            -H 'Node-RED-Deployment-Type: full' \
            -d @"$DEPLOY_DIR/nodered/flows.json")
          if [ "$HTTP_CODE" = "204" ]; then
            echo "Flows deployed successfully"
          else
            echo "::error::Flow deploy returned HTTP $HTTP_CODE"
            exit 1
          fi

      - name: Restart Node-RED to load module changes
        working-directory: /mnt/user/appdata/tak-server
        run: |
          # Container restart needed for settings.js and cot-maps.js changes
          # (functionGlobalContext is only read at startup)
          docker compose restart nodered

      - name: Verify core services running
        working-directory: /mnt/user/appdata/tak-server
        run: |
          sleep 10
          docker compose ps --format json | python3 -c "
          import sys, json
          raw = sys.stdin.read().strip()
          services = [json.loads(line) for line in raw.splitlines() if line.strip()]
          # Profile services (incident-tracker) may crash-loop if not configured
          # Only fail on core services
          profile_services = {'incident-tracker', 'mesh-relay', 'github-runner'}
          failed = []
          warned = []
          for s in services:
              if 'running' not in s.get('State', ''):
                  if s['Name'] in profile_services:
                      warned.append(s['Name'])
                  else:
                      failed.append(s['Name'])
          if warned:
              print(f'::warning::Optional services not running: {warned}')
          if failed:
              print(f'FAILED services: {failed}')
              sys.exit(1)
          print(f'All {len(services) - len(warned)} core services running')
          "

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deployment failed on Unraid. Check docker compose logs on the server."
